name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.0"

jobs:
  # ── Frontend: Lint + Type Check + Build ────
  web:
    name: Web (lint, type-check, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:5000

  # ── Backend: Build + Test ──────────────────
  api:
    name: API (build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/EduConnect.Api/EduConnect.Api.csproj

      - name: Build
        run: dotnet build src/EduConnect.Api/EduConnect.Api.csproj -c Release --no-restore

      - name: Test
        run: |
          if [ -d "tests" ]; then
            dotnet test tests/ -c Release --no-build --verbosity normal
          else
            echo "No test project found — skipping (will be added in future sprints)"
          fi

  # ── Docker Build Verification ──────────────
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [web, api]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t educonnect-api:ci ./apps/api

      - name: Build Web image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=http://localhost:3000 \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:5000 \
            -t educonnect-web:ci ./apps/web

  # ── API Startup Migration Smoke Test ───────
  migrations:
    name: API startup migration smoke test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: educonnect_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore API dependencies
        run: dotnet restore apps/api/src/EduConnect.Api/EduConnect.Api.csproj

      - name: Build API
        run: dotnet build apps/api/src/EduConnect.Api/EduConnect.Api.csproj -c Release --no-restore

      - name: Start API and verify EF migrations apply on boot
        run: |
          LOG_FILE="$(mktemp)"

          export ASPNETCORE_ENVIRONMENT=Production
          export ASPNETCORE_URLS=http://127.0.0.1:5080
          export DATABASE_URL=postgresql://test:test@localhost:5432/educonnect_test
          export JWT_SECRET=ci-secret-key-minimum-64-characters-long-for-hmac-sha256-signing
          export JWT_ISSUER=ci-api
          export JWT_AUDIENCE=ci-web
          export PIN_MIN_LENGTH=4
          export PIN_MAX_LENGTH=6
          export CORS_ALLOWED_ORIGINS=http://localhost:3000
          export RATE_LIMIT_API_PER_USER_PER_MINUTE=60
          export NEXT_PUBLIC_APP_URL=http://localhost:3000
          export RESEND_API_KEY=ci-resend-key
          export RESEND_FROM_EMAIL="EduConnect <no-reply@example.com>"

          dotnet run \
            --project apps/api/src/EduConnect.Api/EduConnect.Api.csproj \
            -c Release \
            --no-build >"${LOG_FILE}" 2>&1 &
          API_PID=$!

          cleanup() {
            if kill -0 "${API_PID}" 2>/dev/null; then
              kill "${API_PID}" 2>/dev/null || true
              wait "${API_PID}" 2>/dev/null || true
            fi
          }

          trap cleanup EXIT

          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:5080/health >/dev/null; then
              echo "API booted successfully and applied EF Core migrations."
              exit 0
            fi

            if ! kill -0 "${API_PID}" 2>/dev/null; then
              echo "API exited before becoming healthy."
              cat "${LOG_FILE}"
              exit 1
            fi

            sleep 2
          done

          echo "API did not become healthy within the timeout."
          cat "${LOG_FILE}"
          exit 1
