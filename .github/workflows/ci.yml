name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.0"

jobs:
  # ── Frontend: Lint + Type Check + Build ────
  web:
    name: Web (lint, type-check, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:5000

  # ── Backend: Build + Test ──────────────────
  api:
    name: API (build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/EduConnect.Api/EduConnect.Api.csproj

      - name: Build
        run: dotnet build src/EduConnect.Api/EduConnect.Api.csproj -c Release --no-restore

      - name: Test
        run: |
          if [ -d "tests" ]; then
            dotnet test tests/ -c Release --no-build --verbosity normal
          else
            echo "No test project found — skipping (will be added in future sprints)"
          fi

  # ── Docker Build Verification ──────────────
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [web, api]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t educonnect-api:ci ./apps/api

      - name: Build Web image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=http://localhost:3000 \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:5000 \
            -t educonnect-web:ci ./apps/web

  # ── SQL Migration Lint ─────────────────────
  migrations:
    name: SQL migration lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: educonnect_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run migrations against test DB
        run: |
          for file in apps/api/src/EduConnect.Api/Infrastructure/Database/Migrations/*.sql; do
            echo "Running: $file"
            PGPASSWORD=test psql -h localhost -U test -d educonnect_test -f "$file"
          done
        env:
          PGPASSWORD: test
