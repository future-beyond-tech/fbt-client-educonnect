services:
  # ── PostgreSQL ─────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: educonnect-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: educonnect
      POSTGRES_USER: educonnect
      POSTGRES_PASSWORD: educonnect_dev
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # NOTE: EF Core migrations plus development seed scripts are applied by
      # the .NET API on startup. Do NOT mount Migrations into
      # /docker-entrypoint-initdb.d — it would race with the API startup flow.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U educonnect"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ClamAV (virus scanning for attachments) ─
  clamav:
    image: clamav/clamav:stable
    container_name: educonnect-clamav
    restart: unless-stopped
    ports:
      - "3310:3310"
    volumes:
      - clamav_db:/var/lib/clamav
    healthcheck:
      # clamdcheck.sh is shipped in the official image; returns 0 once clamd accepts connections.
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      # First boot pulls the virus signature DB via freshclam (~2-3 min); be patient.
      start_period: 240s

  # ── .NET API ───────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: educonnect-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      clamav:
        condition: service_healthy
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DATABASE_URL: "Host=db;Port=5432;Database=educonnect;Username=educonnect;Password=educonnect_dev"
      JWT_SECRET: "dev-secret-key-minimum-64-characters-long-for-hmac-sha256-signing-requirement"
      JWT_ISSUER: educonnect-api
      JWT_AUDIENCE: educonnect-client
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      SENTRY_DSN: ""
      # ── Cloudflare R2 (file attachments) ──
      # Values come from .env.docker — populate S3_SECRET_KEY there before running.
      S3_BUCKET_NAME: "${S3_BUCKET_NAME:-educonnect-attachments}"
      AWS_REGION: "${AWS_REGION:-auto}"
      S3_SERVICE_URL: "${S3_SERVICE_URL}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY}"
      S3_SECRET_KEY: "${S3_SECRET_KEY}"
      # ── ClamAV ──
      CLAMAV_ENABLED: "${CLAMAV_ENABLED:-true}"
      CLAMAV_HOST: "${CLAMAV_HOST:-clamav}"
      CLAMAV_PORT: "${CLAMAV_PORT:-3310}"
      CLAMAV_TIMEOUT_SECONDS: "${CLAMAV_TIMEOUT_SECONDS:-30}"

  # ── Next.js Web ────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        NEXT_PUBLIC_API_URL: http://localhost:5000
        NEXT_PUBLIC_SENTRY_DSN: ""
    container_name: educonnect-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production

volumes:
  pgdata:
  clamav_db:
